<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="A voice-only dungeon. Click, then speak. The dungeon answers aloud." />
<meta property="og:title" content="Vork" />
<meta property="og:description" content="A voice-only dungeon. Click, then speak. The dungeon answers aloud." />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="Vork" />
<meta name="twitter:description" content="A voice-only dungeon. Click, then speak. The dungeon answers aloud." />
<title>VORK</title>
<style>
  :root {
    --bg:#040a06; --grid:#0c2b18;
    --you:#39ff8e;     /* your voice — phosphor green */
    --dungeon:#ffb43a; /* the dungeon — amber CRT     */
    --dim:#1f6b40;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; overflow:hidden; background:#000; }
  body {
    font:13px/1.5 "DejaVu Sans Mono","Consolas",monospace;
    color:var(--dim); cursor:default;
    display:flex; align-items:center; justify-content:center; height:100vh;
  }
  #screen {
    position:relative; width:100vw; height:100vh; background:
      radial-gradient(120% 90% at 50% 50%, #08160d 0%, #040a06 55%, #010402 100%);
    overflow:hidden;
  }
  canvas { position:absolute; inset:0; width:100%; height:100%; }
  /* CRT scanlines + vignette */
  #crt {
    position:absolute; inset:0; pointer-events:none; z-index:3;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,.18) 3px, rgba(0,0,0,0) 4px),
      radial-gradient(130% 130% at 50% 50%, rgba(0,0,0,0) 55%, rgba(0,0,0,.7) 100%);
    animation:flicker 7s infinite;
  }
  @keyframes flicker { 0%,100%{opacity:1} 50%{opacity:.94} 97%{opacity:.88} }

  .wordmark {
    position:absolute; top:22px; left:0; right:0; text-align:center; z-index:4;
    color:var(--dungeon); letter-spacing:14px; font-size:14px; font-weight:bold;
    text-shadow:0 0 12px rgba(255,180,58,.55); padding-left:14px;
  }
  #state {
    position:absolute; bottom:34px; left:0; right:0; text-align:center; z-index:4;
    letter-spacing:7px; font-size:12px; text-transform:uppercase; transition:color .3s;
  }
  #state .cur { animation:blink 1.1s step-end infinite; }
  @keyframes blink { 50%{opacity:0} }

  /* faint controls, hidden until you move the mouse */
  #ctrls {
    position:absolute; bottom:14px; right:18px; z-index:5; display:flex; gap:16px;
    opacity:0; transition:opacity .4s; font-size:11px; letter-spacing:1px;
  }
  #screen.show-ctrls #ctrls { opacity:.7; }
  #ctrls span { cursor:pointer; color:var(--dim); }
  #ctrls span.off { text-decoration:line-through; opacity:.5; }

  /* gate */
  #gate {
    position:absolute; inset:0; z-index:10; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; text-align:center;
    background:radial-gradient(120% 90% at 50% 50%, #08160d 0%, #020703 70%);
  }
  #gate h1 { color:var(--dungeon); letter-spacing:20px; font-size:30px; margin:0;
    text-shadow:0 0 22px rgba(255,180,58,.6); padding-left:20px; }
  #begin {
    margin-top:8px; background:transparent; color:var(--you); cursor:pointer;
    border:1px solid var(--dim); border-radius:3px; font:inherit; font-size:14px;
    letter-spacing:3px; padding:14px 26px; text-transform:uppercase;
    box-shadow:0 0 18px rgba(57,255,142,.15);
  }
  #begin:hover { border-color:var(--you); box-shadow:0 0 26px rgba(57,255,142,.35); }
  #gate p { color:var(--dim); font-size:12px; letter-spacing:1px; max-width:340px; }

  /* hidden captions (off by default; press C). text is kept, just not shown. */
  #cc {
    position:absolute; bottom:64px; left:0; right:0; text-align:center; z-index:4;
    color:var(--dungeon); opacity:.8; font-size:14px; letter-spacing:.5px;
    padding:0 12%; display:none;
  }
  #screen.cc #cc { display:block; }
</style>
</head>
<body>
  <div id="screen">
    <canvas id="scope"></canvas>
    <div class="wordmark">V O R K</div>
    <div id="cc"></div>
    <div id="state">initializing<span class="cur">_</span></div>
    <div id="ctrls">
      <span id="t-mic" title="pause mic (space)">◉ mic</span>
      <span id="t-voice" title="mute voice (m)">♪ voice</span>
      <span id="t-cc" class="off" title="captions (c)">▤ cc</span>
    </div>
    <div id="crt"></div>
    <div id="gate">
      <h1>V O R K</h1>
      <button id="begin">▶ enter the underground</button>
      <p>a voice into the dark. click to wake the dungeon, then simply speak.</p>
    </div>
  </div>

<script>
const screen = document.getElementById("screen");
const canvas = document.getElementById("scope");
const ctx = canvas.getContext("2d");
const stateEl = document.getElementById("state");
const ccEl = document.getElementById("cc");

const sessionId = "s-" + Math.random().toString(36).slice(2);
const transcript = [];           // narration kept in memory (text gutted from UI, not lost)

let ws = null, micCtx = null, ttsCtx = null, micAnalyser = null, ttsAnalyser = null, micStream = null;
let micOn = true, voiceOn = true;
let live = false;                // forwarding mic frames to server?
let state = "boot";              // boot | listening | hearing | thinking | speaking

const COLORS = { listening: "--you", hearing: "--you", thinking: "--dungeon", speaking: "--dungeon", boot: "--dim" };
const LABELS = { listening: "listening", hearing: "hearing you", thinking: "the dungeon stirs", speaking: "speaking", boot: "initializing" };
const css = (v) => getComputedStyle(document.documentElement).getPropertyValue(v).trim();

function setState(s) {
  state = s;
  stateEl.innerHTML = LABELS[s] + '<span class="cur">_</span>';
  stateEl.style.color = css(COLORS[s]);
}
function setLive(on) { live = on && micOn && (state === "listening" || state === "hearing"); }

// ---------- oscilloscope ----------
let W = 0, H = 0, dpr = 1;
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = canvas.clientWidth; H = canvas.clientHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener("resize", resize);

function drawGraticule() {
  ctx.save();
  ctx.strokeStyle = css("--grid"); ctx.lineWidth = 1; ctx.globalAlpha = .55;
  const stepX = W / 12, stepY = H / 8;
  ctx.beginPath();
  for (let x = stepX; x < W; x += stepX) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
  for (let y = stepY; y < H; y += stepY) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
  ctx.stroke();
  ctx.globalAlpha = 1; ctx.strokeStyle = css("--grid"); ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, H / 2); ctx.lineTo(W, H / 2); ctx.stroke(); // baseline
  ctx.restore();
}

const buf = new Float32Array(1024);
let sweep = 0;
function drawTrace(color) {
  ctx.save();
  ctx.lineWidth = 2; ctx.strokeStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 16;
  ctx.lineJoin = "round"; ctx.beginPath();
  const mid = H / 2, amp = H * 0.34;

  if (state === "thinking" || state === "boot") {
    // a travelling pulse sweeping the baseline — the dungeon composing
    sweep += 0.012; if (sweep > 1) sweep -= 1;
    const cx = sweep * W;
    for (let x = 0; x <= W; x += 2) {
      const d = (x - cx) / (W * 0.06);
      const env = Math.exp(-d * d);
      const y = mid - Math.sin(x * 0.05 + sweep * 30) * amp * 0.5 * env
                    - (Math.random() - 0.5) * 2;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
  } else {
    const an = state === "speaking" ? ttsAnalyser : micAnalyser;
    if (an) an.getFloatTimeDomainData(buf);
    const gain = state === "speaking" ? 1.0 : 2.2; // mic is quieter; boost for visibility
    const n = buf.length;
    for (let x = 0; x <= W; x++) {
      const i = Math.floor((x / W) * (n - 1));
      const v = an ? Math.max(-1, Math.min(1, buf[i] * gain)) : 0;
      const y = mid - v * amp + (Math.random() - 0.5) * 0.6;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
  }
  ctx.stroke(); ctx.restore();
}

function frame() {
  // phosphor persistence: fade prior frame instead of clearing
  ctx.fillStyle = "rgba(4,10,6,0.30)"; ctx.fillRect(0, 0, W, H);
  drawGraticule();
  drawTrace(css(COLORS[state] || "--you"));
  requestAnimationFrame(frame);
}

// ---------- voice ----------
async function speak(text) {
  transcript.push(text); console.log("%c[dungeon] " + text, "color:#ffb43a");
  ccEl.textContent = text;
  if (!voiceOn) return;
  try {
    const r = await fetch("/api/tts", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ text }) });
    if (!r.ok) return;
    const audioBuf = await ttsCtx.decodeAudioData(await r.arrayBuffer());
    await new Promise((resolve) => {
      const node = ttsCtx.createBufferSource();
      node.buffer = audioBuf;
      node.connect(ttsAnalyser); ttsAnalyser.connect(ttsCtx.destination);
      setState("speaking");
      node.onended = resolve;
      node.start();
    });
  } catch (_) {}
}

// a full dungeon turn: (thinking already shown) -> fetch+speak -> resume listening
async function dungeonTurn(text) {
  await speak(text);
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: "resume" }));
  setState("listening"); setLive(true);
}

// kept for re-adding a text path later (no UI right now)
async function sendText(v) {
  setState("thinking"); setLive(false);
  const r = await fetch("/api/type", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ sessionId, text: v }) });
  const data = await r.json();
  if (!data.error) await dungeonTurn(data.text);
}
window.sendText = sendText; // accessible from console

const WORKLET = `
class PCM extends AudioWorkletProcessor {
  process(inputs) {
    const ch = inputs[0][0];
    if (ch) {
      const i16 = new Int16Array(ch.length);
      for (let i = 0; i < ch.length; i++) { let s = Math.max(-1, Math.min(1, ch[i])); i16[i] = s < 0 ? s*0x8000 : s*0x7fff; }
      this.port.postMessage(i16.buffer, [i16.buffer]);
    }
    return true;
  }
}
registerProcessor('pcm', PCM);`;

async function startVoice() {
  ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws");
  ws.binaryType = "arraybuffer";
  ws.onopen = () => ws.send(JSON.stringify({ type: "hello", sessionId, sampleRate: micCtx?.sampleRate }));
  ws.onmessage = (e) => {
    const m = JSON.parse(e.data);
    if (m.type === "speech_start") { if (state === "listening") setState("hearing"); }
    else if (m.type === "thinking") { setLive(false); setState("thinking"); }
    else if (m.type === "narration") { if (m.heard) console.log("%c[heard] " + m.heard, "color:#9cf"); dungeonTurn(m.text); }
    else if (m.type === "error") console.warn("[server]", m.message);
  };
  ws.onclose = () => { if (state !== "boot") setState("boot"), (stateEl.textContent = "disconnected — reload"); };

  micCtx = new AudioContext({ sampleRate: 16000 });
  if (micCtx.sampleRate !== 16000) console.warn("mic context at", micCtx.sampleRate, "Hz, expected 16000");
  ttsCtx = new AudioContext();
  // autoGainControl was pumping the signal to 3-10x normal speech RMS, garbling
  // it for Gemma — keep it off. echoCancellation stays on so TTS playback
  // doesn't loop back into the mic; noiseSuppression helps Silero ignore
  // room noise and doesn't touch gain.
  micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: false, channelCount: 1 } });
  const src = micCtx.createMediaStreamSource(micStream);
  micAnalyser = micCtx.createAnalyser(); micAnalyser.fftSize = 1024; src.connect(micAnalyser);
  ttsAnalyser = ttsCtx.createAnalyser(); ttsAnalyser.fftSize = 1024;

  const url = URL.createObjectURL(new Blob([WORKLET], { type: "application/javascript" }));
  await micCtx.audioWorklet.addModule(url);
  const node = new AudioWorkletNode(micCtx, "pcm");
  node.port.onmessage = (ev) => { if (live && ws && ws.readyState === 1) ws.send(ev.data); };
  src.connect(node); node.connect(micCtx.destination); // silent output
}

// ---------- controls ----------
const tMic = document.getElementById("t-mic"), tVoice = document.getElementById("t-voice"), tCc = document.getElementById("t-cc");
function toggleMic() { micOn = !micOn; tMic.classList.toggle("off", !micOn); setLive(micOn); if (!micOn && state==="hearing") setState("listening"); }
function toggleVoice() { voiceOn = !voiceOn; tVoice.classList.toggle("off", !voiceOn); }
function toggleCc() { screen.classList.toggle("cc"); tCc.classList.toggle("off"); }
tMic.onclick = toggleMic; tVoice.onclick = toggleVoice; tCc.onclick = toggleCc;
addEventListener("keydown", (e) => {
  if (e.code === "Space") { e.preventDefault(); toggleMic(); }
  else if (e.key === "m") toggleVoice();
  else if (e.key === "c") toggleCc();
});
let hideT;
addEventListener("mousemove", () => { screen.classList.add("show-ctrls"); clearTimeout(hideT); hideT = setTimeout(() => screen.classList.remove("show-ctrls"), 2000); });

// ---------- boot ----------
document.getElementById("begin").addEventListener("click", async () => {
  document.getElementById("gate").remove();
  resize(); frame();
  setState("thinking");
  try {
    await startVoice();
    const r = await fetch("/api/start", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ sessionId }) });
    const data = await r.json();
    if (data.error) { console.warn(data.error); }
    else { await speak(data.text); }
  } catch (e) { console.error("setup failed", e); }
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: "resume" }));
  setState("listening"); setLive(true);
});
</script>
</body>
</html>
